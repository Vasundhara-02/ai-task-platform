services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network
    restart: always

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    container_name: redis
    command: redis-server --save "" --appendonly no
    networks:
      - app-network
    restart: always

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/aitasks
      - JWT_SECRET=mysupersecretkey123
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - app-network
    restart: always

  worker:
    build: ./worker
    container_name: worker
    environment:
      - MONGO_URI=mongodb://mongodb:27017/aitasks
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - app-network
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: always

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge
